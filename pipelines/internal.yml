image: ruby:latest

variables:
  JEKYLL_ENV: production
  LC_ALL: C.UTF-8

before_script:
  - gem install bundler
  - bundle install

test:
  stage: test
  script:
  - bundle exec jekyll build -d test --config _config_internal.yml
  artifacts:
    paths:
    - test
  rules:
    - if: $CI_COMMIT_REF_NAME != $CI_DEFAULT_BRANCH

release:
  stage: deploy
  script:
    - bundle exec jekyll build -d public --config _config_internal.yml
  artifacts:
    paths:
      - public
  rules:
    # Run only on tags (you can also specify branches like main/master)
    - if: '$CI_COMMIT_TAG'
