<div
    style="
        border: 1px solid #e1e4e8;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        overflow: hidden;
        background: #fff;
        margin: 1.5rem 0;
    "
>
    <div
        style="
            padding: 12px 16px;
            background: #f6f8fa;
            border-bottom: 1px solid #e1e4e8;
            font-weight: 600;
            font-size: 0.9rem;
            color: #57606a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        "
    >
        <span>{{ include.title | default: "Example" }}</span>
        <div style="display: flex; gap: 8px">
            {% if include.newtab == "true" %}<a
                href="overview.html#{{ include.src | split: '/' | last }}"
                target="_blank"
                style="
                    font-size: 0.8rem;
                    font-weight: 500;
                    color: #57606a;
                    background: #e1e4e8;
                    padding: 4px 10px;
                    border-radius: 6px;
                    text-decoration: none;
                "
                >Open in Tab</a
            >{% endif %}<a
                href="{{ include.src }}"
                download
                style="
                    font-size: 0.8rem;
                    font-weight: 500;
                    color: #fff;
                    background: #66bb6a;
                    padding: 4px 10px;
                    border-radius: 6px;
                    text-decoration: none;
                "
                >Download</a
            >
        </div>
    </div>
    <div style="padding: 0">
        <iframe
            src="{{ include.src }}"
            width="100%"
            frameborder="0"
            onload="
                this.style.height =
                    this.contentWindow.document.body.scrollHeight + 'px'
            "
        ></iframe>
    </div>
</div>
