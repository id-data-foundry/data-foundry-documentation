        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Local AI Example 5</title>
        <link
            rel="stylesheet"
            href="/assets/stylesheets/picoCSS/pico.jade.min.css"
        />
        <script src="/assets/javascripts/local-ai/latest/local-ai.min.js"></script>
        <script src="https://www.WebRTC-Experiment.com/RecordRTC.js"></script>
    </head>
    <body>
        <main class="container">
            <h1>Example 5: audio to text transcription</h1>

            <p>
                Let's try transcribing some audio right here. Press the button
                to start recording...
            </p>

            <button id="submitBtn">Start</button>
            <span id="status"></span>

            <hr />
            <br />

            <div class="output" id="result"></div>

            <script type="module">
                let recording = false;
                let recordAudio;

                document
                    .querySelector("#submitBtn")
                    .addEventListener("click", async (e) => {
                        // toggle recording state
                        recording = !recording;

                        // change the button text for toggling between recording and stopping
                        document.querySelector("#submitBtn").innerText =
                            recording ? "Stop" : "Start";
                        // change the status indicator
                        document.querySelector("#status").innerText = recording
                            ? "Recording..."
                            : "";

                        // record and process all-in-one
                        foundry.soundToText({
                            // optional: server (ex. "https://data-foundry.net")
                            server: "",
                            // generate your own API token on Data Foundry
                            api_token: "YOUR_API_KEY",
                            // process a 'file' or 'record'
                            type: "record",
                            // the time slicing that is sent to the server for processing
                            sliceDuration: 6000,
                            // fill in results in the HTML element with the id "result"
                            resultElementSelector: "#result",
                            // loading indicator element
                            loadingElementSelector: "#result",
                            // no logging on console needed
                            logging: true,
                            stopRec: !recording,
                        });
                    });
            </script>
        </main>
    </body>
