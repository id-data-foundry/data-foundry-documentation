  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Local AI Example 1</title>
  <link rel="stylesheet" href="/assets/stylesheets/picoCSS/pico.jade.min.css">
  <script src="/assets/javascripts/local-ai/latest/local-ai.min.js"></script>
</head>
<body>
  <main class="container">

    <h1>Example 1: prompt 101</h1>

    <p>
      Just ask the LLM something. Anything. This model might be <i>uncensored</i>, so you can be a bit naughty if you want.
    </p>

    <textarea id="prompt" rows="6">What is the culturally-appropriate choice if you can only pick one ice-cream flavor?</textarea>

    <div class="grid">
      <p>
        <button id="submitBtn">Submit</button>
      </p>
      <details>
        <summary>Extra settings</summary>
        <p>
          <label>Temperature:</label>
          <input type="range" id="temperature" min="0.0" value="0.9" max="2.0" step="0.1">
        </p>
      </details>
    </div>

    <p id="result"></p>

    <script type="text/javascript">

      // listen to button clicks and handle them
      document.querySelector('#submitBtn').addEventListener('click', async (e) => {

        // prevent double submission and set loading indicator
        document.querySelector('#submitBtn').setAttribute('disabled', true)
        // remove previous result
        document.querySelector('#result').innerText = "";

        // retrieve prompt
        const prompt = document.querySelector('#prompt').value;
        // retrieve temperature
        const temperature = parseFloat(document.querySelector('#temperature').value);

        // send request
        await foundry.textToText({
          // optional: server
          server: "",
          // generate your own API token on Data Foundry
          api_token: "YOUR_API_KEY",
          // select the model
          model: "phi-2-chat",
          // submit the prompt as a user message
          messages: [{role: "user", content: prompt}],
          // submit the temperature of the model
          temperature: temperature,
          // fill results in the HTML element with the id "result"
          resultElementSelector: "#result",
          // loading indicator also on result element
          loadingElementSelector: '#result',
          // no logging on console needed
          logging: false
        })

        // enable submit button again
        document.querySelector('#submitBtn').removeAttribute('disabled')
      });
    </script>
  </main>
</body>
</html>
